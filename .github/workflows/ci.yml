name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore .\EVE-IPH-Modern.slnx

      - name: Build
        run: dotnet build .\EVE-IPH-Modern.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test .\EVE-IPH-Modern.slnx --configuration Release --no-build --verbosity normal